<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Opening Rawabi Shopping…</title>
  <!-- Default store IDs; JS replaces app-argument / android-app href after ?url= -->
  <meta
    name="apple-itunes-app"
    content="app-id=6480009147, app-argument=https://rawabihypermarket.com/Zelo-Fleece-Blanket-200X230-Sy2/25512"
  />
  <script>
    /**
     * Bridge page → Flutter deep links (app_links / uni_links / go_router)
     *
     * Flutter should handle the SAME https://rawabihypermarket.com/.../productId URL
     * (Android App Links + iOS Universal Links), or the custom schemes below.
     *
     * Native setup (mobile team):
     * - Android: intent filters for https host rawabihypermarket.com + assetlinks.json
     * - iOS: Associated Domains applinks:rawabihypermarket.com + AASA file
     * - Custom scheme in AndroidManifest + Info.plist if you use rawabi://...
     *
     * Store listings:
     * - Play:  https://play.google.com/store/apps/details?id=com.app.rawabi
     * - iOS:   https://apps.apple.com/qa/app/rawabi-shopping/id6480009147
     */
    (function () {
      var BRIDGE_HOST = window.location.hostname;

      var CONFIG = {
        /** Same URL the Flutter app should open in Uri.parse / AppLinks (browser + deep link) */
        productWebUrl:
          "https://rawabihypermarket.com/Zelo-Fleece-Blanket-200X230-Sy2/25512",
        productId: "25512",
        androidPackage: "com.app.rawabi",
        iosAppStoreId: "6480009147",
        playStoreUrl:
          "https://play.google.com/store/apps/details?id=com.app.rawabi",
        appStoreUrl:
          "https://apps.apple.com/qa/app/rawabi-shopping/id6480009147",
        /**
         * Flutter-friendly fallbacks if only custom scheme is registered (not https).
         * Match AndroidManifest + Info.plist CFBundleURLSchemes / intent filters.
         */
        customSchemeUrls: [],
        androidIntentFallback: "web",
        iosOpenAppStoreIfStillHere: true,
        iosAppStoreDelayMs: 2800,
        iosCustomSchemeDelayMs: 1600,
      };

      function extractProductIdFromPath(webUrl) {
        try {
          var p = new URL(webUrl).pathname.replace(/\/+$/, "");
          var last = p.split("/").pop();
          return last && /^\d+$/.test(last) ? last : null;
        } catch (e) {
          return null;
        }
      }

      /** Paths your Flutter router may listen for — extend as needed */
      function buildFlutterDeepLinkCandidates(productId, webUrl) {
        var id = String(productId);
        var base = "https://rawabihypermarket.com";
        return [
          webUrl,
          base + "/product/" + id,
          "rawabi://product/" + id,
          "com.app.rawabi://product/" + id,
          "rawabihypermarket://product/" + id,
          "rawabi://open?productId=" + encodeURIComponent(id),
          "com.app.rawabi://open?productId=" + encodeURIComponent(id),
        ];
      }

      function parseOverrides() {
        var q = new URLSearchParams(window.location.search);
        var u = q.get("url") || q.get("u");
        if (u) {
          try {
            CONFIG.productWebUrl = decodeURIComponent(u);
          } catch (e) {
            CONFIG.productWebUrl = u;
          }
        }
        var id = q.get("id") || q.get("productId");
        if (!id) id = extractProductIdFromPath(CONFIG.productWebUrl);
        if (id) {
          CONFIG.productId = id;
        }
        CONFIG.customSchemeUrls = buildFlutterDeepLinkCandidates(
          CONFIG.productId,
          CONFIG.productWebUrl
        );
        if (q.get("androidFallback") === "store") {
          CONFIG.androidIntentFallback = "store";
        }
      }

      function injectHeadMeta() {
        var apple = document.querySelector('meta[name="apple-itunes-app"]');
        if (apple) {
          apple.setAttribute(
            "content",
            "app-id=" +
              CONFIG.iosAppStoreId +
              ", app-argument=" +
              CONFIG.productWebUrl
          );
        } else {
          var m = document.createElement("meta");
          m.name = "apple-itunes-app";
          m.content =
            "app-id=" +
            CONFIG.iosAppStoreId +
            ", app-argument=" +
            CONFIG.productWebUrl;
          document.head.appendChild(m);
        }

        var parsed;
        try {
          parsed = new URL(CONFIG.productWebUrl);
        } catch (e) {
          return;
        }
        var hostPath =
          parsed.hostname +
          (parsed.pathname || "") +
          (parsed.search || "");
        var androidAppHref =
          "android-app://" +
          CONFIG.androidPackage +
          "/https/" +
          hostPath;
        var existing = document.querySelector('link[rel="alternate"][href^="android-app://"]');
        if (existing) {
          existing.setAttribute("href", androidAppHref);
        } else {
          var link = document.createElement("link");
          link.rel = "alternate";
          link.href = androidAppHref;
          document.head.appendChild(link);
        }
      }

      function isAndroid(ua) {
        return /android/i.test(ua);
      }

      function isIOS(ua) {
        return (
          /iPhone|iPad|iPod/i.test(ua) ||
          (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1)
        );
      }

      function stillOnBridgePage() {
        return window.location.hostname === BRIDGE_HOST;
      }

      function androidFallbackEncoded() {
        var u =
          CONFIG.androidIntentFallback === "store"
            ? CONFIG.playStoreUrl
            : CONFIG.productWebUrl;
        return encodeURIComponent(u);
      }

      function buildAndroidIntentHttps(webUrl, pkg) {
        var parsed;
        try {
          parsed = new URL(webUrl);
        } catch (e) {
          return null;
        }
        var host = parsed.hostname;
        var pathname = parsed.pathname || "/";
        var encodedPath = pathname
          .split("/")
          .filter(function (seg) {
            return seg.length > 0;
          })
          .map(function (seg) {
            return encodeURIComponent(seg);
          })
          .join("/");
        var pathPart = encodedPath ? "/" + encodedPath : "";
        var intentPath =
          "intent://" + host + pathPart + (parsed.search || "");
        return (
          intentPath +
          "#Intent;scheme=https;package=" +
          pkg +
          ";S.browser_fallback_url=" +
          androidFallbackEncoded() +
          ";end"
        );
      }

      function buildAndroidIntentCustomScheme(productId, pkg, schemeName) {
        schemeName = schemeName || "rawabi";
        return (
          "intent://product/" +
          encodeURIComponent(productId) +
          "#Intent;scheme=" +
          schemeName +
          ";package=" +
          pkg +
          ";S.browser_fallback_url=" +
          androidFallbackEncoded() +
          ";end"
        );
      }

      function tryIframe(url) {
        var el = document.createElement("iframe");
        el.style.display = "none";
        el.style.width = "0";
        el.style.height = "0";
        el.setAttribute("src", url);
        document.documentElement.appendChild(el);
        setTimeout(function () {
          try {
            el.remove();
          } catch (e) {}
        }, 2000);
      }

      function openIOSDeepLinks() {
        var schemes = CONFIG.customSchemeUrls;
        for (var i = 0; i < schemes.length; i++) {
          if (schemes[i].indexOf("https://") === 0) continue;
          tryIframe(schemes[i]);
        }
        var firstCustom = schemes.filter(function (u) {
          return u.indexOf("https://") !== 0;
        })[0];
        if (firstCustom) {
          window.location.href = firstCustom;
        }
      }

      function scheduleIOS() {
        var store = CONFIG.appStoreUrl;
        var productUrl = CONFIG.productWebUrl;
        var pageHidden = false;
        document.addEventListener(
          "visibilitychange",
          function () {
            if (document.hidden) pageHidden = true;
          },
          { once: true }
        );

        setTimeout(function () {
          window.location.href = productUrl;
        }, 0);

        setTimeout(function () {
          if (!stillOnBridgePage() || pageHidden) return;
          openIOSDeepLinks();
        }, CONFIG.iosCustomSchemeDelayMs);

        if (CONFIG.iosOpenAppStoreIfStillHere) {
          setTimeout(function () {
            if (!stillOnBridgePage() || pageHidden) return;
            window.location.replace(store);
          }, CONFIG.iosAppStoreDelayMs);
        }
      }

      function scheduleAndroid() {
        var pkg = CONFIG.androidPackage;
        var pid = CONFIG.productId;
        var intentHttps = buildAndroidIntentHttps(CONFIG.productWebUrl, pkg);
        var intentRawabi = buildAndroidIntentCustomScheme(pid, pkg, "rawabi");

        setTimeout(function () {
          tryIframe(intentRawabi);
        }, 0);

        setTimeout(function () {
          if (intentHttps) {
            window.location.href = intentHttps;
          } else {
            window.location.href = CONFIG.productWebUrl;
          }
        }, 50);
      }

      parseOverrides();
      injectHeadMeta();

      var ua = navigator.userAgent || "";

      if (!isAndroid(ua) && !isIOS(ua)) {
        window.location.replace(CONFIG.productWebUrl);
        return;
      }

      if (isAndroid(ua)) {
        scheduleAndroid();
        return;
      }

      if (isIOS(ua)) {
        scheduleIOS();
      }
    })();
  </script>
</head>
<body>
  <p class="loading" style="font-family: system-ui, sans-serif; padding: 1rem; color: #333">
    Opening product…
  </p>
  <noscript>
    <p>
      <a href="https://rawabihypermarket.com/Zelo-Fleece-Blanket-200X230-Sy2/25512"
        >Continue to product</a
      >
      ·
      <a href="https://play.google.com/store/apps/details?id=com.app.rawabi">Google Play</a>
      ·
      <a href="https://apps.apple.com/qa/app/rawabi-shopping/id6480009147">App Store</a>
    </p>
  </noscript>
</body>
</html>
